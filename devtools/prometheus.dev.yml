global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Forge API server running locally (uv run uvicorn forge.main:app --port 8000)
  - job_name: 'forge-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics

  # Forge worker running locally (uv run forge worker)
  - job_name: 'forge-worker'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: /metrics
